            commandLine 'cmd', '/c', """cl.exe /DAR_ENABLE_JNI /I"${javaHome}\\include" /I"${javaHome}\\include\\win32" /std:c++latest /Od /fp:strict /Qcov-gen /GZ /arch:IA32 /LD acceleratedRecoilingLib.cpp /Fe"build\\lld.biLgnilioceRdetareleccA" /Fd"build\\acceleratedRecoilingLib.pdb" /link /OPT:REF /OPT:ICF"""
